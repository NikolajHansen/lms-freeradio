name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Build plugin ZIP
        run: |
          bash scripts/package.sh
          
      - name: Calculate SHA1 and update extensions.xml
        run: |
          SHA1=$(sha1sum lms-freeradio-*.zip | awk '{print $1}')
          echo "SHA1 digest: ${SHA1}"
          
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Update extensions.xml with new SHA1
          sed -i "s/<sha>[^<]*<\/sha>/<sha>${SHA1}<\/sha>/" extensions.xml
          
          # Commit and push the updated extensions.xml to master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add extensions.xml
          git commit -m "Update SHA1 digest for v${VERSION} release" || echo "No changes to commit"
          git push origin master
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: lms-freeradio-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
