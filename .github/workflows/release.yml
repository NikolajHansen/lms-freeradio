name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract version and generate files from templates
        run: |
          # Extract version from tag (strip 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
          # Generate install.xml from template
          sed "s/{{VERSION}}/${VERSION}/g" install.xml.template > install.xml
          
          # Generate temporary extensions.xml with placeholder SHA
          sed "s/{{VERSION}}/${VERSION}/g; s/{{SHA1}}/PLACEHOLDER/g" extensions.xml.template > extensions.xml
          
          echo "Generated files for version ${VERSION}"
          
      - name: Build plugin ZIP
        run: |
          bash scripts/package.sh
          
      - name: Calculate SHA1 and finalize metadata files
        run: |
          SHA1=$(sha1sum lms-freeradio-*.zip | awk '{print $1}')
          echo "SHA1 digest: ${SHA1}"
          
          # Generate final extensions.xml with actual SHA1
          sed "s/{{VERSION}}/${VERSION}/g; s/{{SHA1}}/${SHA1}/g" extensions.xml.template > extensions.xml
          # Keep install.xml synchronized on default branch
          sed "s/{{VERSION}}/${VERSION}/g" install.xml.template > install.xml
          
          # Commit and push the updated metadata files to master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add extensions.xml install.xml
          git commit -m "Update plugin metadata for v${VERSION} release" || echo "No changes to commit"
          git push origin master
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: lms-freeradio-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
